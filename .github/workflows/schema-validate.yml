name: Schema.org JSON-LD validate (8 pages)

on:
  schedule:
    # KST 13:00 = UTC 04:00
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - '.github/workflows/schema-validate.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON-LD blocks in every HTML page
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          import { resolve } from 'node:path';

          const ROOT = process.cwd();
          // 8 main pages require Schema. 404.html does not.
          const REQUIRED_PAGES = [
            'index.html',
            'reservation/index.html',
            'course/index.html',
            'dresscode/index.html',
            'parking/index.html',
            'budget/index.html',
            'manners/index.html',
            'compare/index.html',
          ];
          const OPTIONAL_PAGES = ['404.html'];
          const REQUIRED_TYPES = ['Restaurant','LocalBusiness','NightClub','BarOrPub'];

          let failed = 0;

          const validate = (rel, requireTypes) => {
            const path = resolve(ROOT, rel);
            let html;
            try { html = readFileSync(path, 'utf8'); }
            catch { console.log(`SKIP missing: ${rel}`); return; }

            const blocks = [...html.matchAll(/<script type="application\/ld\+json">([\s\S]*?)<\/script>/g)];
            if (blocks.length === 0) {
              if (requireTypes) {
                console.error(`FAIL ${rel}: no JSON-LD found`);
                failed++;
              } else {
                console.log(`OK   ${rel}: (no JSON-LD, not required)`);
              }
              return;
            }

            const allTypes = new Set();
            for (const b of blocks) {
              try {
                const json = JSON.parse(b[1].trim());
                const visit = (n) => {
                  if (Array.isArray(n)) return n.forEach(visit);
                  if (n && typeof n === 'object') {
                    if (n['@type']) {
                      const t = Array.isArray(n['@type']) ? n['@type'] : [n['@type']];
                      t.forEach(x => allTypes.add(x));
                    }
                    if (n['@graph']) visit(n['@graph']);
                    if (n.mainEntity) visit(n.mainEntity);
                  }
                };
                visit(json);
              } catch (e) {
                console.error(`FAIL ${rel}: JSON parse error: ${e.message}`);
                failed++;
              }
            }

            if (requireTypes) {
              const missing = REQUIRED_TYPES.filter(t => !allTypes.has(t));
              if (missing.length) {
                console.error(`FAIL ${rel}: missing types: ${missing.join(', ')}`);
                failed++;
                return;
              }
            }
            console.log(`OK   ${rel}: types = ${[...allTypes].join(', ')}`);
          };

          for (const rel of REQUIRED_PAGES) validate(rel, true);
          for (const rel of OPTIONAL_PAGES) validate(rel, false);

          if (failed) { console.error(`\n${failed} failure(s)`); process.exit(1); }
          console.log('\nAll JSON-LD blocks valid.');
          NODE
