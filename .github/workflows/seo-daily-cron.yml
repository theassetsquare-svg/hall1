name: SEO daily cron (sitemap lastmod + IndexNow)

on:
  schedule:
    # KST 12:00 = UTC 03:00
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap.xml lastmod + feed.xml lastBuildDate
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          NOW_RFC=$(TZ=Asia/Seoul date -R)
          echo "Today (KST): $TODAY"
          # sitemap.xml: replace all <lastmod> values
          sed -i -E "s#<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>#<lastmod>${TODAY}</lastmod>#g" sitemap.xml
          # feed.xml: replace <lastBuildDate>
          sed -i -E "s#<lastBuildDate>[^<]*</lastBuildDate>#<lastBuildDate>${NOW_RFC}</lastBuildDate>#g" feed.xml
          # llms.txt: replace "최종 갱신:" line
          sed -i -E "s#(최종 갱신: ).*#\1${TODAY}#g" llms.txt

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add sitemap.xml feed.xml llms.txt
            git commit -m "chore(seo): daily sitemap/feed/llms refresh ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          else
            echo "No changes"
          fi

      - name: Ping Google sitemap
        continue-on-error: true
        run: |
          curl -sf "https://www.google.com/ping?sitemap=https://hall1.pages.dev/sitemap.xml" || true

      - name: Ping Bing sitemap
        continue-on-error: true
        run: |
          curl -sf "https://www.bing.com/ping?sitemap=https://hall1.pages.dev/sitemap.xml" || true

      - name: IndexNow submission (optional)
        if: ${{ env.INDEXNOW_KEY != '' }}
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true
        run: |
          curl -sf -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "hall1.pages.dev",
              "key": "'"$INDEXNOW_KEY"'",
              "urlList": [
                "https://hall1.pages.dev/",
                "https://hall1.pages.dev/reservation/",
                "https://hall1.pages.dev/course/",
                "https://hall1.pages.dev/dresscode/",
                "https://hall1.pages.dev/parking/",
                "https://hall1.pages.dev/budget/",
                "https://hall1.pages.dev/manners/",
                "https://hall1.pages.dev/compare/"
              ]
            }' || true
